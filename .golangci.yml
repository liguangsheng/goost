version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      # unsafe package conversions are intentional in bytesconv.
      - path: bytesconv/
        linters:
          - gosec
