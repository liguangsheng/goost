name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.25.10"
  GO_NEXT_VERSION: "1.26.3"
  GOLANGCI_LINT_VERSION: latest
  STATICCHECK_VERSION: latest
  GOVULNCHECK_VERSION: latest
  GOSEC_VERSION: latest

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            examples/go.sum
            lru/benchmark/go.sum
            zapctx/zapctxgin/go.sum
            zapctx/zapctxgrpc/go.sum
      - run: ./scripts/install-ci-tools.sh --root
      - run: ./scripts/check-root.sh --full
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  split-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            examples/go.sum
            lru/benchmark/go.sum
            zapctx/zapctxgin/go.sum
            zapctx/zapctxgrpc/go.sum
      - run: ./scripts/install-ci-tools.sh --split
      - run: ./scripts/check-split-modules.sh --full

  examples-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            examples/go.sum
            go.sum
      - name: Build examples
        run: |
          for dir in examples/*/; do
            echo "::group::build $dir"
            (cd "$dir" && go build .)
            echo "::endgroup::"
          done

  windows-root-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - run: go test ./...

  go-next-root-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_NEXT_VERSION }}
          cache-dependency-path: go.sum
      - run: ./scripts/check-root.sh --quick

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Run benchmarks
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -bench=. -benchmem -count=1 ./pool ./batcher ./ratelimit ./random 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
