name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25.10']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: golangci-lint run ./...

  split-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Check split modules
        run: |
          set -euo pipefail
          find . -mindepth 2 -name go.mod -print0 |
            while IFS= read -r -d '' mod; do
              dir="$(dirname "$mod")"
              echo "::group::$dir"
              (cd "$dir" && go vet ./... && go test ./... && staticcheck ./... && govulncheck ./...)
              echo "::endgroup::"
            done

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
      - name: Run Gosec
        uses: securego/gosec@master
        with:
          # G115: bounded mask conversions in random.
          # G301/G302: log files need group/other readability (0o644/0o755) for logrotate, ops tooling.
          # G304: rotatingwriter takes the file path from the caller by design.
          args: -exclude=G115,G301,G302,G304 -exclude-dir=examples ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
