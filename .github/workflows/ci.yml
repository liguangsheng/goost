name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.25.10"
  GOLANGCI_LINT_VERSION: latest
  STATICCHECK_VERSION: latest
  GOVULNCHECK_VERSION: latest
  GOSEC_VERSION: latest

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            examples/go.sum
            lru/benchmark/go.sum
            zapctx/zapctxgin/go.sum
            zapctx/zapctxgrpc/go.sum
      - run: ./scripts/install-ci-tools.sh --root
      - run: ./scripts/check-root.sh --full
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  split-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            examples/go.sum
            lru/benchmark/go.sum
            zapctx/zapctxgin/go.sum
            zapctx/zapctxgrpc/go.sum
      - run: ./scripts/install-ci-tools.sh --split
      - run: ./scripts/check-split-modules.sh --full
